<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save Video - FreeDownloaderSite</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 40px; }
        
        /* টাইটেল: শুধু নাম এবং সলিড কালো */
        .site-name-top { 
            font-size: 28px; 
            font-weight: 800; 
            color: #1a1a1a; 
            margin-top: 40px; 
            text-align: center; 
            width: 95%; 
        }

        /* সতর্কবার্তা: স্বাভাবিক কালার কিন্তু শেষে ফুলস্টপ */
        .disclaimer { 
            font-size: 13px; 
            color: #666; 
            text-align: center; 
            width: 85%; 
            margin: 12px 0 30px 0; 
            font-style: italic; 
            font-weight: 500; 
        }

        .auth-card { background: white; padding: 35px 25px; border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.06); width: 90%; max-width: 450px; text-align: center; box-sizing: border-box; border: 1px solid #eee; }
        .success-text { color: #2ecc71; font-weight: bold; font-size: 16px; margin-bottom: 20px; display: block; }
        
        .video-preview-container { width: 100%; border-radius: 20px; background: #000; margin-bottom: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); position: relative; min-height: 200px; border: 1px solid #eee; }
        video { width: 100%; display: block; max-height: 400px; background: #000; }
        
        /* ডাউনলোড বাটন: কালো ব্যাকগ্রাউন্ড এবং সোনালী বর্ডার */
        .download-btn { 
            background: #1a1a1a !important; 
            color: white !important; 
            border: 2.5px solid #D4AF37 !important; /* সোনালী বর্ডার */
            padding: 20px; 
            width: 100%; 
            border-radius: 18px; 
            font-size: 22px; 
            font-weight: 800; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.2); 
            transition: 0.3s; 
            margin-top: 10px; 
            outline: none;
        }
        .download-btn:active { transform: scale(0.97); }
        .download-btn:disabled { background: #555 !important; border-color: #777 !important; cursor: not-allowed; }

        .new-download { margin-top: 25px; display: inline-block; color: #1a1a1a !important; text-decoration: none; font-size: 16px; font-weight: 800; border-bottom: 2px solid #1a1a1a; padding-bottom: 2px; }
    </style>
</head>
<body>

    <div class="site-name-top">FreeDownloaderSite</div>

    <div class="disclaimer">How you use it is your business and your responsibility.</div>

    <div class="auth-card">
        <span class="success-text">✓ Video Ready to Download</span>
        
        <div class="video-preview-container">
            <video id="videoPlayer" controls playsinline>
                <source id="videoSource" src="" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>

        <button id="downloadBtn" onclick="handleDownload()" class="download-btn">DOWNLOAD</button>
        
        <br>
        <a href="dashboard.html" class="new-download">Download Another Video</a>
    </div>

    <script>
        const finalLink = localStorage.getItem("downloadableUrl");

        window.onload = function() {
            if (finalLink && finalLink !== "undefined") {
                const player = document.getElementById("videoPlayer");
                const source = document.getElementById("videoSource");
                source.src = finalLink;
                player.load();
                
                player.onerror = function() {
                    console.log("Preview might be blocked by platform security.");
                };
            } else {
                alert("Session expired. Please paste the link again.");
                window.location.href = "dashboard.html";
            }
        };

        async function handleDownload() {
            const btn = document.getElementById("downloadBtn");
            const originalText = btn.innerText;
            btn.innerText = "DOWNLOADING...";
            btn.disabled = true;

            try {
                const response = await fetch(finalLink);
                if (!response.ok) throw new Error("CORS or Security Block");

                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = "FreeDownloader_" + Date.now() + ".mp4"; 
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                
                btn.innerText = "DONE!";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }, 3000);

            } catch (error) {
                console.log("Direct download failed, opening in new tab.");
                window.open(finalLink, '_blank');
                
                btn.innerText = originalText;
                btn.disabled = false;
                
                alert("If it starts playing:\n1. Tap the 3 dots (⋮) or long-press the video.\n2. Select 'Download' to save to Gallery.");
            }
        }
    </script>
</body>
</html>
