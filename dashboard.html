<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FreeDownloaderSite</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 40px; }
        .site-name-top { font-size: 28px; font-weight: 800; color: #1a1a1a; margin-top: 40px; text-align: center; width: 95%; letter-spacing: -0.5px; }
        .disclaimer { font-size: 13px; color: #666; text-align: center; width: 80%; margin: 12px 0 20px 0; line-height: 1.6; font-style: italic; font-weight: 500; }
        .auth-card { background: white; padding: 40px 25px; border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.06); width: 90%; max-width: 450px; text-align: center; border: 1px solid #eee; box-sizing: border-box; z-index: 1; }
        .label-text { font-size: 15px; font-weight: 700; color: #444; margin-bottom: 10px; display: block; text-align: left; padding-left: 5px; }
        
        .input-container { position: relative; width: 100%; margin-bottom: 25px; }
        .input-box { width: 100%; padding: 18px 50px 18px 18px; border: 1px solid #ddd; border-radius: 18px; box-sizing: border-box; font-size: 16px; outline: none; background: #fafafa; color: #333; }
        
        .clear-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: #ddd; color: #666; width: 25px; height: 25px; border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        
        /* SnapSave Style Progress Bar */
        #progressArea { display: none; margin: 20px 0; text-align: left; background: #f0f0f0; padding: 15px; border-radius: 15px; }
        .progress-label { font-size: 14px; font-weight: 700; color: #333; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .progress-bg { width: 100%; background: #e0e0e0; height: 12px; border-radius: 6px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #28a745; transition: width 0.3s ease; }

        select { width: 100%; padding: 18px; margin-bottom: 25px; border: 1px solid #ddd; border-radius: 18px; box-sizing: border-box; font-size: 16px; outline: none; background: #fafafa; color: #333; }
        .main-btn { background: #1a1a1a; color: white; border: none; padding: 20px; width: 100%; border-radius: 18px; font-size: 20px; font-weight: 800; cursor: pointer; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); transition: 0.3s; }
        .main-btn:disabled { background: #555; cursor: not-allowed; }
        .ad-slot { width: 90%; max-width: 450px; min-height: 70px; background: #f0f0f0; border: 1px dashed #ccc; margin: 15px 0; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: #888; font-size: 12px; }
    </style>
</head>
<body>

    <div class="site-name-top">FreeDownloaderSite.com</div>
    <div class="ad-slot">Banner Advertisement Space</div>

    <div class="disclaimer">
        How you use it is your business and your responsibility
    </div>

    <div class="auth-card">
        <span class="label-text">Select Video Quality:</span>
        <select id="quality">
            <option value="1080">1080p Full HD</option>
            <option value="720">720p HD</option>
            <option value="480">480p Standard</option>
            <option value="mp3">MP3 Audio</option>
        </select>

        <span class="label-text">Paste Link:</span>
        <div class="input-container">
            <input type="text" id="videoUrl" class="input-box" placeholder="Paste link here..." oninput="toggleClearBtn()">
            <div id="clearBtn" class="clear-btn" onclick="clearInput()">✕</div>
        </div>

        <span class="label-text">Select Platform:</span>
        <select id="platform">
            <option value="auto" selected>All in One (Auto Detect)</option>
            <option value="fb">Facebook</option>
            <option value="ig">Instagram</option>
            <option value="cc">CapCut</option>
        </select>

        <div id="progressArea">
            <div class="progress-label">
                <span id="statusText">Fetching Video...</span>
                <span id="percentText">0%</span>
            </div>
            <div class="progress-bg">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <div id="sizeDetail" style="font-size: 11px; color: #666; margin-top: 5px; font-weight: 600;">0 MB / 0 MB</div>
        </div>

        <button class="main-btn" id="processBtn" onclick="startProcess()">PROCESS VIDEO</button>
    </div>

    <div class="ad-slot" style="min-height: 100px;">Native Advertisement Space</div>

    <script>
        function toggleClearBtn() {
            const input = document.getElementById('videoUrl');
            const clearBtn = document.getElementById('clearBtn');
            clearBtn.style.display = input.value.length > 0 ? 'flex' : 'none';
        }

        function clearInput() {
            document.getElementById('videoUrl').value = '';
            toggleClearBtn();
            document.getElementById('videoUrl').focus();
        }

        function startProcess() {
            const rawInput = document.getElementById('videoUrl').value.trim();
            const quality = document.getElementById('quality').value;
            const platform = document.getElementById('platform').value;
            const btn = document.getElementById('processBtn');
            const pArea = document.getElementById('progressArea');
            const pFill = document.getElementById('progressFill');
            const sText = document.getElementById('statusText');
            const percText = document.getElementById('percentText');
            const sDetail = document.getElementById('sizeDetail');

            if (!rawInput) {
                alert("Please paste a video link!");
                return;
            }

            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const foundLinks = rawInput.match(urlRegex);
            if (!foundLinks) {
                alert("No valid link found!");
                return;
            }
            
            const cleanUrl = foundLinks[0]; 

            // UI Reset
            btn.disabled = true;
            btn.innerText = "CONNECTING...";
            pArea.style.display = "block";
            pFill.style.width = "0%";

            const apiUrl = `https://my-downloader-api-ascp.onrender.com/download?url=${encodeURIComponent(cleanUrl)}&quality=${quality}&platform=${platform}`;

            const xhr = new XMLHttpRequest();
            xhr.open('GET', apiUrl, true);

            // SnapSave Style Progress Logic
            xhr.onprogress = function (e) {
                if (e.lengthComputable) {
                    const percent = Math.floor((e.loaded / e.total) * 100);
                    pFill.style.width = percent + "%";
                    percText.innerText = percent + "%";
                    sText.innerText = "Downloading Data...";
                    sDetail.innerText = (e.loaded / (1024 * 1024)).toFixed(2) + " MB / " + (e.total / (1024 * 1024)).toFixed(2) + " MB";
                } else {
                    sText.innerText = "Processing File...";
                }
            };

            xhr.onload = function () {
                if (this.status === 200) {
                    const data = JSON.parse(this.responseText);
                    if (data.success) {
                        pFill.style.width = "100%";
                        percText.innerText = "100%";
                        sText.innerText = "Ready to Save!";
                        localStorage.setItem("downloadableUrl", data.url || data.download_link);
                        localStorage.setItem("videoTitle", data.title || "Video");
                        
                        setTimeout(() => {
                            window.location.href = "save.html";
                        }, 500);
                    } else {
                        alert("Error: " + data.error);
                        resetButton();
                    }
                } else {
                    alert("Server Error. Please try again.");
                    resetButton();
                }
            };

            xhr.onerror = function () {
                alert("Connection failed. Check your internet.");
                resetButton();
            };

            xhr.send();
        }

        function resetButton() {
            const btn = document.getElementById('processBtn');
            const pArea = document.getElementById('progressArea');
            btn.disabled = false;
            btn.innerText = "PROCESS VIDEO";
            pArea.style.display = "none";
        }
    </script>
</body>
</html>
