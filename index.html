        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBk2jjTTdZxJycfhTFHBOY3VIYq_M2E8-8",
            authDomain: "freedownloadersite-49a17.firebaseapp.com",
            projectId: "freedownloadersite-49a17",
            storageBucket: "freedownloadersite-49a17.firebasestorage.app",
            messagingSenderId: "463390867655",
            appId: "1:463390867655:web:d03a30bbce8e7224dbbee2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // পেজ লোড হওয়ার সময় চেক করবে ইউজার আগে এসেছে কি না
        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem("isUserSaved") === "true") {
                document.getElementById("headerTitle").innerText = "WELCOME BACK";
            }
        });

        window.handleAuth = async function(type) {
            const input = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;

            if(!input || pass.length < 6) {
                alert("Please enter valid info (Password 6+ chars)");
                return;
            }

            let finalUser = input.includes("@") ? input : input + "@phone.com";

            if(type === 'signup') {
                createUserWithEmailAndPassword(auth, finalUser, pass)
                .then(() => {
                    localStorage.setItem("isUserSaved", "true");
                    window.location.href = "dashboard.html";
                })
                .catch((err) => {
                    if(err.code === 'auth/email-already-in-use') {
                        alert("Account already exists. Please Log In.");
                    } else {
                        alert(err.message);
                    }
                });
            } else {
                signInWithEmailAndPassword(auth, finalUser, pass)
                .then(() => {
                    localStorage.setItem("isUserSaved", "true");
                    window.location.href = "dashboard.html";
                })
                .catch((err) => alert("Login Failed: " + err.message));
            }
        }

        window.handleReset = function() {
            const input = document.getElementById('userInput').value;
            if(!input || !input.includes("@")) { alert("Enter email first"); return; }
            sendPasswordResetEmail(auth, input).then(() => alert("Reset link sent!")).catch((err) => alert(err.message));
        }
    </script>
    <script>
        function toggleAbout(show) { document.getElementById("aboutModal").style.display = show ? "block" : "none"; }
        function togglePass() {
            var p = document.getElementById("passInput");
            p.type = (p.type === "password") ? "text" : "password";
            document.querySelector(".toggle-txt").innerText = (p.type === "password") ? "Show" : "Hide";
        }
    </script>
</body>
</html>
