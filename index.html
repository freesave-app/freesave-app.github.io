<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeSave.com - Access</title>
    <link rel="icon" type="image/png" href="ns-logo.png">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 40px; }
        
        .logo-container { margin-top: 40px; display: flex; justify-content: center; }
        .logo-circle { width: 110px; height: 110px; background: #000; border: 3.5px solid #D4AF37; border-radius: 50%; display: flex; justify-content: center; align-items: center; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .logo-circle img { width: 100%; height: 100%; object-fit: cover; }

        .site-name-top { font-size: 28px; font-weight: 800; color: #1a1a1a; margin-top: 15px; text-align: center; }
        .disclaimer { font-size: 11px; color: #555; text-align: center; width: 85%; margin-top: 5px; margin-bottom: 25px; line-height: 1.5; }

        /* হেডার লিঙ্কগুলো কার্ডের উইডথ এর সমান করার জন্য */
        .header-section { width: 92%; max-width: 420px; display: flex; justify-content: space-between; margin-bottom: 8px; box-sizing: border-box; padding: 0 5px; }
        .header-link { color: #1a1a1a; font-size: 14px; font-weight: bold; cursor: pointer; text-decoration: none; border-bottom: 2px solid #1a1a1a; }

        /* কার্ডের ডিজাইন - আপনার স্ক্রিনশট অনুযায়ী চওড়া এবং বর্ডার */
        .auth-card, .trial-card { 
            background: white; 
            padding: 40px 25px; 
            border-radius: 40px; /* বেশি গোল বর্ডার */
            box-shadow: 0 10px 40px rgba(0,0,0,0.05); 
            width: 92%; 
            max-width: 420px; 
            text-align: center; 
            border: 1px solid #ddd; 
            box-sizing: border-box; 
        }
        .trial-card { margin-top: 20px; padding: 30px 25px; }

        input { width: 100%; padding: 20px; margin: 12px 0 5px 0; border: 1px solid #f0f0f0; border-radius: 18px; box-sizing: border-box; font-size: 16px; outline: none; background: #fdfdfd; }
        
        .pass-wrapper { position: relative; width: 100%; }
        .toggle-txt { position: absolute; right: 15px; top: 30px; cursor: pointer; color: #1a1a1a; font-size: 10px; font-weight: 800; text-transform: uppercase; background: #eee; padding: 4px 8px; border-radius: 6px; }

        .forgot-link { font-size: 13px; color: #1a1a1a; text-decoration: none; font-weight: 700; display: block; text-align: right; margin: 15px 0; }

        /* বাটন ডিজাইন - স্ক্রিনশটের মতো গোল্ডেন বর্ডার সহ সলিড ব্ল্যাক */
        .btn-container { display: flex; gap: 12px; margin-top: 10px; }
        .auth-btn { 
            background: #1a1a1a; 
            color: #fff; 
            border: 2.5px solid #D4AF37; 
            padding: 18px; 
            flex: 1; 
            border-radius: 20px; 
            font-size: 16px; 
            font-weight: 800; 
            cursor: pointer; 
            text-transform: uppercase; 
            text-decoration: none;
            display: inline-block;
        }

        .limit-text { font-size: 14px; color: #1a1a1a; font-weight: 800; margin-bottom: 15px; display: block; }

        .ad-slot { width: 92%; max-width: 420px; height: 100px; background: #f0f0f0; border: 1px dashed #ccc; margin-top: 25px; border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #888; font-size: 12px; }
        
        .footer-links { margin-top: 25px; }
        .footer-links a { color: #999; font-size: 12px; text-decoration: none; border-bottom: 1px solid #ddd; }

        .modal { display: none; position: fixed; z-index: 99; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 20% auto; padding: 30px; border-radius: 30px; width: 85%; max-width: 380px; text-align: center; }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="logo-circle"><img src="ns-logo.png" alt="Logo"></div>
    </div>

    <div class="site-name-top">FreeSave.com</div>

    <div class="disclaimer">
        How you use it is your business and your responsibility.
    </div>

    <div class="header-section">
        <a class="header-link" onclick="toggleModal('noticeModal', true)">Notice</a>
        <a class="header-link" onclick="toggleModal('aboutModal', true)">About Us</a>
    </div>

    <div class="auth-card">
        <h2 style="font-size: 26px; font-weight: 900; margin-bottom: 30px;">WELCOME</h2>
        <input type="text" id="userInput" placeholder="Mobile Number or Email">
        <div class="pass-wrapper">
            <input type="password" id="passInput" placeholder="Password">
            <div class="toggle-txt" onclick="togglePass()">Show</div>
        </div>
        <a class="forgot-link">Forgot Password?</a>
        <div class="btn-container">
            <button class="auth-btn" onclick="handleAuth('signup')">SIGN UP</button>
            <button class="auth-btn" onclick="handleAuth('login')">LOG IN</button>
        </div>
    </div>

    <div class="ad-slot">Advertisement Space (Google AdSense)</div>

    <div class="footer-links">
        <a href="privacy.html">Privacy Policy</a>
    </div>

    <div class="trial-card">
        <span class="limit-text">Get 3 Free Downloads Per Day</span>
        <a href="trial-dashboard.html" class="auth-btn" style="width: 100%; display: block; box-sizing: border-box;">START FOR FREE</a>
    </div>

    <div id="noticeModal" class="modal"><div class="modal-content">...<button onclick="toggleModal('noticeModal', false)">Close</button></div></div>
    <div id="aboutModal" class="modal"><div class="modal-content">...<button onclick="toggleModal('aboutModal', false)">Close</button></div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        const firebaseConfig = { 
            apiKey: "AIzaSyBk2jjTTdZxJycfhTFHBOY3VIYq_M2E8-8", 
            authDomain: "freedownloadersite-49a17.firebaseapp.com", 
            projectId: "freedownloadersite-49a17", 
            storageBucket: "freedownloadersite-49a17.firebasestorage.app", 
            messagingSenderId: "463390867655", 
            appId: "1:463390867655:web:d03a30bbce8e7224dbbee2" 
        };
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.handleAuth = function(type) {
            const input = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;
            if(!input || pass.length < 6) { alert("Invalid Info"); return; }
            let email = input.includes("@") ? input : input + "@phone.com";
            
            const action = type === 'signup' ? createUserWithEmailAndPassword : signInWithEmailAndPassword;
            action(auth, email, pass).then(() => {
                localStorage.setItem("isUserSaved", "true");
                window.location.href = "dashboard.html";
            }).catch(err => alert(err.message));
        }
    </script>

    <script>
        function togglePass() {
            var p = document.getElementById("passInput");
            p.type = p.type === "password" ? "text" : "password";
            document.querySelector(".toggle-txt").innerText = p.type === "password" ? "Show" : "Hide";
        }
        function toggleModal(id, show) { document.getElementById(id).style.display = show ? "block" : "none"; }
        
        window.onload = function() {
            let count = parseInt(localStorage.getItem('free_downloads')) || 0;
            if (localStorage.getItem("isUserSaved") !== "true" && count >= 3) {
                const btn = document.querySelector('.trial-card .auth-btn');
                if(btn) { btn.style.background = "red"; btn.innerText = "LIMIT EXCEEDED"; btn.href = "#"; btn.onclick = () => alert("Limit finished!"); }
            }
        };
    </script>
</body>
</html>
