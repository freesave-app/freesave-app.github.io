<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeSave - Access</title>
    <link rel="icon" type="image/png" href="ns-logo.png">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 40px; }
        
        .logo-container { margin-top: 40px; display: flex; justify-content: center; }
        .logo-circle {
            width: 110px; height: 110px; 
            background: #000; 
            border: 3.5px solid #D4AF37; 
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .logo-circle img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }

        .site-name-top { font-size: 28px; font-weight: 800; color: #1a1a1a; margin-top: 15px; text-align: center; width: 90%; }
        .disclaimer { font-size: 11px; color: #555; text-align: center; width: 85%; margin-top: 5px; margin-bottom: 15px; line-height: 1.5; }
        
        .header-section { width: 85%; max-width: 400px; display: flex; justify-content: flex-end; margin-bottom: 5px; }
        .about-link { color: #1a1a1a; font-size: 14px; font-weight: bold; cursor: pointer; text-decoration: none; border-bottom: 2px solid #1a1a1a; padding: 2px 0; }

        .auth-card { background: white; padding: 35px 25px; border-radius: 30px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); width: 85%; max-width: 400px; text-align: center; border: 1px solid #ddd; }
        
        /* ইনপুট ফিল্ড আপনার ছবির মতো */
        input { width: 100%; padding: 18px; margin: 12px 0 5px 0; border: 1px solid #eee; border-radius: 15px; box-sizing: border-box; font-size: 15px; outline: none; background: #fdfdfd; }
        
        .pass-wrapper { position: relative; width: 100%; }
        .toggle-txt { position: absolute; right: 15px; top: 28px; cursor: pointer; color: #1a1a1a; font-size: 10px; font-weight: 800; text-transform: uppercase; background: #eee; padding: 4px 7px; border-radius: 6px; user-select: none; }
        .forgot-link { font-size: 13px; color: #1a1a1a; text-decoration: none; font-weight: 700; display: block; text-align: right; margin: 10px 0; cursor: pointer; }
        
        /* বাটন ডিজাইন: ছবির মতো চারকোনা কিন্তু কোণাগুলো স্মুথ রাউন্ডেড */
        .btn-container { display: flex; gap: 12px; margin-top: 20px; }
        .auth-btn { 
            background: #1a1a1a; 
            color: #fff; 
            border: 2px solid #D4AF37; 
            padding: 18px; 
            flex: 1; 
            border-radius: 15px; /* ঠিক আপনার দেখানো ছবির মতো কার্ভ */
            font-size: 16px; 
            font-weight: 800; 
            cursor: pointer; 
            transition: 0.2s;
            text-transform: uppercase;
        }
        .auth-btn:active { transform: scale(0.98); }
        
        .ad-slot { width: 85%; max-width: 400px; height: 90px; background: #f0f0f0; border: 1px dashed #ccc; margin-top: 25px; border-radius: 15px; display: flex; align-items: center; justify-content: center; color: #888; font-size: 12px; }
        .footer-links { margin-top: 20px; text-align: center; }
        .footer-links a { color: #999; font-size: 12px; text-decoration: none; border-bottom: 1px solid #ddd; padding-bottom: 2px; }

        .modal { display: none; position: fixed; z-index: 99; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); }
        .modal-content { background: white; margin: 15% auto; padding: 35px 25px; border-radius: 25px; width: 85%; max-width: 380px; text-align: center; position: relative; }
    </style>
</head>
<body>

    <div class="logo-container">
        <div class="logo-circle">
            <img src="ns-logo.png" alt="NS Logo">
        </div>
    </div>

    <div class="site-name-top">FreeSave.com</div>
    <div class="disclaimer">
        How you use it is your business and your responsibility.
    </div>

    <div class="header-section">
        <a class="about-link" onclick="toggleAbout(true)">About Us</a>
    </div>

    <div class="auth-card">
        <h2 id="headerTitle" style="font-size: 24px; font-weight: 800; margin-bottom: 25px;">WELCOME</h2>
        
        <input type="text" id="userInput" placeholder="Mobile Number or Email" required>
        
        <div class="pass-wrapper">
            <input type="password" id="passInput" placeholder="Password" required>
            <div class="toggle-txt" onclick="togglePass()">Show</div>
        </div>
        
        <span class="forgot-link" onclick="handleReset()">Forgot Password?</span>

        <div class="btn-container">
            <button class="auth-btn" onclick="handleAuth('signup')">SIGN UP</button>
            <button class="auth-btn" onclick="handleAuth('login')">LOG IN</button>
        </div>
    </div>

    <div class="ad-slot">Advertisement Space (Google AdSense)</div>

    <div class="footer-links">
        <a href="privacy.html">Privacy Policy</a>
    </div>

    <div id="aboutModal" class="modal">
        <div class="modal-content">
            <span style="font-size: 22px; font-weight: bold; color: #1a1a1a; margin-bottom: 10px; display: block;">FreeSave.com</span>
            <p style="text-align: left;"><strong>Owner:</strong> Kayra Haque</p>
            <p style="text-align: left;"><strong>Email:</strong> sitefreedownloader@gmail.com</p>
            <p style="text-align: left; font-size: 13px; margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px;">
                Check our <a href="privacy.html" style="color: #1a1a1a; font-weight: bold;">Privacy Policy</a> to see how we protect your info.
            </p>
            <button type="button" class="auth-btn" onclick="toggleAbout(false)" style="margin-top: 25px; width: 100%;">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBk2jjTTdZxJycfhTFHBOY3VIYq_M2E8-8",
            authDomain: "freedownloadersite-49a17.firebaseapp.com",
            projectId: "freedownloadersite-49a17",
            storageBucket: "freedownloadersite-49a17.firebasestorage.app",
            messagingSenderId: "463390867655",
            appId: "1:463390867655:web:d03a30bbce8e7224dbbee2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Welcome Back Check
        window.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem("isUserSaved") === "true") {
                document.getElementById("headerTitle").innerText = "WELCOME BACK";
            }
        });

        window.handleAuth = async function(type) {
            const input = document.getElementById('userInput').value;
            const pass = document.getElementById('passInput').value;

            if(!input || pass.length < 6) {
                alert("Please enter valid info (Password 6+ chars)");
                return;
            }

            let finalUser = input.includes("@") ? input : input + "@phone.com";

            if(type === 'signup') {
                createUserWithEmailAndPassword(auth, finalUser, pass)
                .then(() => {
                    localStorage.setItem("isUserSaved", "true");
                    window.location.href = "dashboard.html";
                })
                .catch((err) => {
                    if(err.code === 'auth/email-already-in-use') {
                        alert("Account already exists. Please Log In.");
                    } else {
                        alert(err.message);
                    }
                });
            } else {
                signInWithEmailAndPassword(auth, finalUser, pass)
                .then(() => {
                    localStorage.setItem("isUserSaved", "true");
                    window.location.href = "dashboard.html";
                })
                .catch((err) => alert("Login Failed: " + err.message));
            }
        }

        window.handleReset = function() {
            const input = document.getElementById('userInput').value;
            if(!input || !input.includes("@")) { alert("Enter email first"); return; }
            sendPasswordResetEmail(auth, input).then(() => alert("Reset link sent!")).catch((err) => alert(err.message));
        }
    </script>
    <script>
        function toggleAbout(show) { document.getElementById("aboutModal").style.display = show ? "block" : "none"; }
        function togglePass() {
            var p = document.getElementById("passInput");
            p.type = (p.type === "password") ? "text" : "password";
            document.querySelector(".toggle-txt").innerText = (p.type === "password") ? "Show" : "Hide";
        }
    </script>
</body>
</html>
