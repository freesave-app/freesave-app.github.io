<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Trial Dashboard - FreeSave</title> 
    <style> 
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8f9fa; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding-bottom: 40px; } 
        .site-title { font-size: 28px; font-weight: 900; color: #000; margin-top: 35px; text-align: center; } 
        .auth-card { background: white; padding: 40px 25px; border-radius: 30px; box-shadow: 0 15px 50px rgba(0,0,0,0.06); width: 90%; max-width: 450px; text-align: center; border: 1px solid #eee; margin-top: 20px; box-sizing: border-box; } 
        .label-text { font-size: 15px; font-weight: 700; color: #000; margin-bottom: 10px; display: block; text-align: left; } 
        .input-box { width: 100%; padding: 18px; border: 1.5px solid #ddd; border-radius: 18px; box-sizing: border-box; font-size: 16px; outline: none; background: #fafafa; margin-bottom: 25px; } 
        .main-btn { background: #000000; color: white; border: 2.5px solid #D4AF37; padding: 20px; width: 100%; border-radius: 18px; font-size: 20px; font-weight: 800; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); } 
        #progressArea { display: none; margin: 20px 0; background: #f0f0f0; padding: 15px; border-radius: 15px; text-align: left; } 
        .progress-bg { width: 100%; background: #e0e0e0; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 10px; } 
        .progress-fill { width: 0%; height: 100%; background: #28a745; transition: width 0.3s; } 
    </style> 
</head> 
<body> 

    <div class="site-title">FreeSave Trial</div> 
    
    <div class="auth-card"> 
        <span class="label-text">Paste Video Link:</span> 
        <input type="text" id="videoUrl" class="input-box" placeholder="Paste link here..."> 
        
        <div id="progressArea"> 
            <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 14px;"> 
                <span id="statusText">Processing...</span> 
                <span id="percentText">0%</span> 
            </div> 
            <div class="progress-bg"><div id="progressFill" class="progress-fill"></div></div> 
        </div> 

        <button class="main-btn" id="processBtn" onclick="startTrial()">PROCESS VIDEO</button> 
    </div> 

    <script> 
        // ট্রয়াল কাউন্ট লোড করা
        let trialCount = parseInt(localStorage.getItem('free_downloads')) || 0;

        function startTrial() { 
            // ৩টি শেষ হলে ৪র্থ বার ক্লিক করলেই এই মেসেজ আসবে
            if (trialCount >= 3) { 
                alert("আপনার ফ্রি লিমিট শেষ! চালিয়ে যেতে দয়া করে ফ্রি-তে সাইনআপ বা লগইন করুন।"); 
                window.location.href = "index.html"; 
                return; 
            } 

            const rawUrl = document.getElementById('videoUrl').value.trim(); 
            if (!rawUrl) { alert("Please paste a link!"); return; } 

            const btn = document.getElementById('processBtn'); 
            const pArea = document.getElementById('progressArea'); 
            const pFill = document.getElementById('progressFill'); 
            const pText = document.getElementById('percentText'); 

            btn.disabled = true; 
            btn.innerText = "CONNECTING..."; 
            pArea.style.display = "block"; 

            // আপনার API লিঙ্ক (সব প্ল্যাটফর্মের জন্য auto দেওয়া আছে)
            const apiUrl = `https://my-downloader-api-ascp.onrender.com/download?url=${encodeURIComponent(rawUrl)}&quality=720&platform=auto`; 

            const xhr = new XMLHttpRequest(); 
            xhr.open('GET', apiUrl, true); 

            xhr.onprogress = function(e) {
                if (e.lengthComputable) {
                    const percent = Math.floor((e.loaded / e.total) * 100);
                    pFill.style.width = percent + "%";
                    pText.innerText = percent + "%";
                }
            };

            xhr.onload = function () { 
                if (this.status === 200) { 
                    try { 
                        const data = JSON.parse(this.responseText); 
                        if (data.success) { 
                            // সফল ডাউনলোড হলে ১টি কাউন্ট বাড়বে
                            trialCount++; 
                            localStorage.setItem('free_downloads', trialCount); 
                            
                            localStorage.setItem("downloadableUrl", data.url || data.download_link); 
                            localStorage.setItem("videoTitle", data.title || "Video"); 
                            
                            setTimeout(() => { window.location.href = "save.html"; }, 500); 
                        } else { alert("Error: " + data.error); resetButton(); } 
                    } catch(e) { alert("Server Error."); resetButton(); } 
                } else { alert("Server Error."); resetButton(); } 
            }; 
            xhr.onerror = function() { alert("Connection Failed."); resetButton(); }; 
            xhr.send(); 
        } 

        function resetButton() { 
            const btn = document.getElementById('processBtn'); 
            btn.disabled = false; 
            btn.innerText = "PROCESS VIDEO"; 
            document.getElementById('progressArea').style.display = "none"; 
        } 
    </script> 
</body> 
</html>
