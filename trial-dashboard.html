<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Trial - FreeSave.com</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        
        /* মেইন কার্ড ডিজাইন */
        .container { 
            background: white; 
            padding: 40px 25px; 
            border-radius: 40px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            width: 85%; 
            max-width: 400px; 
            text-align: center; 
            border: 1px solid #eee; 
        }

        h2 { font-size: 26px; font-weight: 800; color: #000; margin-bottom: 25px; text-transform: uppercase; }
        
        input { 
            width: 100%; 
            padding: 18px; 
            border: 1px solid #eee; 
            border-radius: 15px; 
            box-sizing: border-box; 
            font-size: 16px; 
            outline: none; 
            background: #fafafa; 
            margin-bottom: 20px; 
        }

        /* বাটন ডিজাইন (আপনার স্ক্রিনশটের মতো) */
        .process-btn { 
            display: block;
            width: 100%;
            background: #1a1a1a; 
            color: #fff; 
            border: 3px solid #D4AF37; 
            padding: 18px; 
            border-radius: 25px; 
            font-size: 20px; 
            font-weight: 800; 
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .process-btn:active { transform: scale(0.98); }

        /* অ্যাড স্লট (কার্ডের নিচে খালি জায়গা) */
        .ad-slot { 
            width: 85%; 
            max-width: 400px; 
            height: 90px; 
            background: #f0f0f0; 
            border: 1px dashed #ccc; 
            margin-top: 30px; 
            border-radius: 15px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: #888; 
            font-size: 12px; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>FREE TRIAL</h2>
        <input type="text" id="videoUrl" placeholder="Paste Video Link Here...">
        <button class="process-btn" onclick="handleTrialDownload()">PROCESS VIDEO</button>
    </div>

    <div class="ad-slot">Advertisement Space (Google AdSense)</div>

    <script>
        function handleTrialDownload() {
            const url = document.getElementById('videoUrl').value;
            if(!url) { alert("Please paste a link first!"); return; }

            let today = new Date().toLocaleDateString();
            let count = parseInt(localStorage.getItem('trial_count')) || 0;
            let lastDate = localStorage.getItem('trial_date');

            if (lastDate !== today) {
                count = 0;
                localStorage.setItem('trial_date', today);
            }

            if (count < 3) {
                // ভিডিও প্রসেসিং এলার্ট
                alert("Processing your video... Please wait.");
                
                count++;
                localStorage.setItem('trial_count', count);
            } else {
                // লিমিট শেষ হওয়ার মেসেজ
                alert("Your free limit is over! To continue, please sign up or log in for free.");
                window.location.href = "index.html"; 
            }
        }
    </script>
</body>
</html>
