<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Trial - FreeSave.com</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8f9fa; margin: 0; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .container { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 85%; max-width: 400px; text-align: center; border: 1px solid #eee; }
        h2 { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
        .limit-text { font-size: 13px; color: #d4af37; font-weight: bold; margin-bottom: 20px; }
        input { width: 100%; padding: 16px; border: 1px solid #eee; border-radius: 12px; box-sizing: border-box; font-size: 15px; outline: none; background: #fafafa; margin-bottom: 15px; }
        .process-btn { background: #1a1a1a; color: #fff; border: 2px solid #D4AF37; padding: 16px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="container">
        <h2>FREE TRIAL</h2>
        <div id="status" class="limit-text">You have 3 free downloads for today</div>
        <input type="text" id="videoUrl" placeholder="Paste Video Link Here...">
        <button class="process-btn" onclick="handleTrialDownload()">Process Video</button>
    </div>

    <script>
        function handleTrialDownload() {
            const url = document.getElementById('videoUrl').value;
            if(!url) { alert("Please paste a link first!"); return; }

            let today = new Date().toLocaleDateString();
            let count = parseInt(localStorage.getItem('trial_count')) || 0;
            let lastDate = localStorage.getItem('trial_date');

            // যদি দিন পরিবর্তন হয় তবে কাউন্ট রিসেট হবে
            if (lastDate !== today) {
                count = 0;
                localStorage.setItem('trial_date', today);
            }

            if (count < 3) {
                // এখানে আপনার এপিআই বা প্রসেসিং কোড বসবে
                alert("Processing your video... Please wait.");
                
                count++;
                localStorage.setItem('trial_count', count);
                document.getElementById('status').innerText = `You have used ${count} of 3 free downloads`;
            } else {
                // আপনার চাওয়া সেই ইংরেজি মেসেজ
                alert("Your free limit is over! To continue, please sign up or log in for free.");
                window.location.href = "index.html"; // ইউজারকে আবার ইনডেক্সে পাঠিয়ে দেবে
            }
        }

        // পেজ লোড হওয়ার সময় স্ট্যাটাস আপডেট
        window.onload = function() {
            let count = localStorage.getItem('trial_count') || 0;
            document.getElementById('status').innerText = `Used ${count} of 3 free downloads today`;
        }
    </script>
</body>
</html>
